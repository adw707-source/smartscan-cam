<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScan Camera</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #videoContainer { position: relative; width: 100%; max-width: 500px; margin: auto; background: #000; border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); color: #fff; }
        .hidden { display: none !important; }
        button { margin: 10px 5px; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; background: #007bff; color: #fff; font-size: 14px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin: 15px 0; font-weight: bold; color: #333; min-height: 20px; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 SmartScan Camera</h1>
        
        <div id="videoContainer">
            <video id="video" autoplay playsinline></video>
            
            <!-- Overlays -->
            <div id="loadingOverlay" class="overlay">
                <p>loading...</p>
            </div>
            <div id="scanningOverlay" class="overlay hidden">
                <p>Scanning...</p>
            </div>
            <div id="errorOverlay" class="overlay hidden">
                <p id="errorMsg">🚫 Error</p>
                <button id="tryAgainBtn">↻ Try Again</button>
            </div>
        </div>

        <div id="status" class="status">Camera starting...</div>
        
        <!-- Controls -->
        <div>
            <button id="startBtn">Start Camera</button>
            <button id="closeBtn" disabled>✕ Close</button>
            <button id="flipBtn" disabled>🔄 Flip</button>
            <button id="fullscreenBtn" disabled>⛶ Fullscreen</button>
            <button id="copyBtn" disabled>📋 Copy</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const scanningOverlay = document.getElementById('scanningOverlay');
        const errorOverlay = document.getElementById('errorOverlay');
        const errorMsg = document.getElementById('errorMsg');
        
        const startBtn = document.getElementById('startBtn');
        const closeBtn = document.getElementById('closeBtn');
        const flipBtn = document.getElementById('flipBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const copyBtn = document.getElementById('copyBtn');
        const tryAgainBtn = document.getElementById('tryAgainBtn');

        let currentStream = null;
        let facingMode = 'environment';

        /**
         * Uses the W3C Permissions API to check the current camera permission state.
         * Note: This does NOT trigger the permission dialog.
         */
        async function checkCameraPermission() {
            if (!navigator.permissions) {
                console.warn('Permissions API not supported in this browser.');
                return 'unknown';
            }
            try {
                const result = await navigator.permissions.query({ name: 'camera' });
                return result.state; // 'granted', 'denied', or 'prompt'
            } catch (e) {
                console.warn('Error querying camera permission:', e);
                return 'unknown';
            }
        }

        /**
         * Starts the camera. Calling getUserMedia triggers the native browser permission dialog 
         * if the permission state is currently 'prompt'.
         */
        async function startCamera() {
            statusEl.textContent = 'Camera starting...';
            statusEl.classList.remove('error');
            loadingOverlay.classList.remove('hidden');
            errorOverlay.classList.add('hidden');
            scanningOverlay.classList.add('hidden');

            // 1. Check permission state via W3C Permissions API
            const permissionState = await checkCameraPermission();
            console.log('Current camera permission state:', permissionState);

            if (permissionState === 'denied') {
                showError('Camera permission denied. Please enable it in your browser settings.');
                return;
            }

            try {
                // 2. Trigger the browser's native permission dialog & get media stream
                const constraints = {
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                
                loadingOverlay.classList.add('hidden');
                scanningOverlay.classList.remove('hidden');
                statusEl.textContent = 'Scanning...';
                
                // Enable controls
                closeBtn.disabled = false;
                flipBtn.disabled = false;
                fullscreenBtn.disabled = false;
                copyBtn.disabled = false;
                startBtn.disabled = true;

                // 3. Listen for permission changes using W3C Permissions API
                if (navigator.permissions) {
                    const result = await navigator.permissions.query({ name: 'camera' });
                    result.onchange = () => {
                        console.log('Permission state changed to:', result.state);
                        if (result.state === 'denied') {
                            stopCamera();
                            showError('Camera permission was revoked.');
                        }
                    };
                }

            } catch (err) {
                console.error('Error accessing camera:', err);
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    showError('Camera permission denied by user.');
                } else if (err.name === 'NotFoundError') {
                    showError('No camera found on this device.');
                } else {
                    showError('Could not start camera: ' + err.message);
                }
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            video.srcObject = null;
            loadingOverlay.classList.add('hidden');
            scanningOverlay.classList.add('hidden');
            errorOverlay.classList.add('hidden');
            statusEl.textContent = 'Camera stopped.';
            
            closeBtn.disabled = true;
            flipBtn.disabled = true;
            fullscreenBtn.disabled = true;
            copyBtn.disabled = true;
            startBtn.disabled = false;
        }

        function showError(message) {
            loadingOverlay.classList.add('hidden');
            scanningOverlay.classList.add('hidden');
            errorOverlay.classList.remove('hidden');
            errorMsg.textContent = '🚫 ' + message;
            statusEl.textContent = 'Error';
            statusEl.classList.add('error');
        }

        // Event Listeners
        startBtn.addEventListener('click', startCamera);
        
        tryAgainBtn.addEventListener('click', () => {
            startCamera();
        });

        closeBtn.addEventListener('click', stopCamera);

        flipBtn.addEventListener('click', () => {
            facingMode = (facingMode === 'environment') ? 'user' : 'environment';
            stopCamera();
            startCamera();
        });

        fullscreenBtn.addEventListener('click', () => {
            const videoContainer = document.getElementById('videoContainer');
            if (!document.fullscreenElement) {
                videoContainer.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        copyBtn.addEventListener('click', () => {
            alert('Copy functionality triggered!');
        });

        // Optional: Auto-start camera on page load to immediately show the permission dialog
        // window.addEventListener('load', startCamera);
    </script>
</body>
</html>
